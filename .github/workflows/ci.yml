# 🐶 Dogfooding：本仓库由 GitHub Actions Skill 自己生成
# 特征：最小权限、并发控制、SHA-1 锁定、缓存优化
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check YAML syntax
        run: |
          python3 -c "
          import yaml, pathlib
          for f in pathlib.Path('examples').glob('*.yml'):
              yaml.safe_load(f.read_text())
              print(f'{f}: ✓')
          "

      - name: Check action pinning
        run: |
          echo ">>> 所有 uses 必须包含 SHA-1（禁止 @main/@master/@v 浮动版本）"
          ! rg -n '@main|@master' examples/ .github/workflows/ || exit 1
          ! rg -n 'uses:\s+\S+@v\d+$' examples/ .github/workflows/ || exit 1
          echo "All actions pinned ✓"

      - name: Check required configs
        run: |
          echo ">>> 每个 workflow 必须有 permissions 和 concurrency"
          for f in examples/*.yml .github/workflows/ci.yml; do
            rg -q 'permissions:' "$f" || { echo "MISSING permissions: $f"; exit 1; }
            rg -q 'concurrency:' "$f" || { echo "MISSING concurrency: $f"; exit 1; }
            echo "$f: ✓"
          done

      - name: Check no hardcoded secrets
        run: |
          rg -n 'ghp_[a-zA-Z0-9]{36}' examples/ .github/workflows/ && exit 1 || echo "No leaked tokens ✓"
          rg -n 'sk-[a-zA-Z0-9]{20,}' examples/ .github/workflows/ && exit 1 || echo "No leaked API keys ✓"
